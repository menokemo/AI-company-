name: ai-company

networks:
  ai-company-net:
    driver: bridge

volumes:
  portainer_data:
  infisical_pg_data:
  infisical_redis_data:
  openhands_workspace:
  openhands_state:
    external: true
    name: ai-company_openhands_state

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: ai-portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - ai-company-net
    mem_limit: 512m

  infisical-db:
    image: postgres:14-alpine
    container_name: ai-infisical-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - ai-company-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m

  infisical-redis:
    image: redis:7-alpine
    container_name: ai-infisical-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - infisical_redis_data:/data
    networks:
      - ai-company-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m

  infisical:
    image: infisical/infisical:latest
    container_name: ai-infisical
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "8080:8080"
    networks:
      - ai-company-net
    mem_limit: 1g

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ai-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ../llm-gateway/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    networks:
      - ai-company-net
    mem_limit: 1g

  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.38
    container_name: ai-openhands
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_started
    environment:
      - WORKSPACE_BASE=/opt/workspace
      - WORKSPACE_MOUNT_PATH=/opt/workspace
      # LLM عبر LiteLLM Gateway (بيقرأ من .env)
      - LLM_BASE_URL=http://ai-litellm:4000
      - LLM_API_KEY=${LITELLM_MASTER_KEY}
      - LLM_MODEL=openai/claude
      - LLM_NUM_RETRIES=3
      # Git (بيقرأ من .env بعد sync من Infisical)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_USERNAME=${GIT_USERNAME:-}
      # Sandbox
      - SANDBOX_USER_ID=1000
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=nikolaik/python-nodejs:python3.12-nodejs22
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands_workspace:/opt/workspace
      - openhands_state:/.openhands-state
    ports:
      - "3000:3000"
    networks:
      - ai-company-net
    mem_limit: 4g
