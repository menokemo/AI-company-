name: ai-company

networks:
  ai-company-net:
    driver: bridge

volumes:
  portainer_data:
  infisical_pg_data:
  infisical_redis_data:
  open_webui_data:
  openhands_workspace:

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: ai-portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - ai-company-net
    mem_limit: 512m

  infisical-db:
    image: postgres:14-alpine
    container_name: ai-infisical-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - ai-company-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m

  infisical-redis:
    image: redis:7-alpine
    container_name: ai-infisical-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - infisical_redis_data:/data
    networks:
      - ai-company-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m

  infisical:
    image: infisical/infisical:latest
    container_name: ai-infisical
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "8080:8080"
    networks:
      - ai-company-net
    mem_limit: 1g

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ai-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ../llm-gateway/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    networks:
      - ai-company-net
    mem_limit: 1g

  start-page:
    image: nginx:alpine
    container_name: ai-start-page
    restart: unless-stopped
    volumes:
      - ../start-page/index.html:/usr/share/nginx/html/index.html:ro
      - ../start-page/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - ai-company-net
    mem_limit: 64m

  # واجهة الشات الرئيسية — Open WebUI
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_IMAGE_TAG:-main}
    container_name: ai-open-webui
    restart: unless-stopped
    environment:
      # توجيه لـ LiteLLM كمزوّد OpenAI-compatible
      - OPENAI_API_BASE_URL=http://ai-litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      # تعطيل Ollama (مش محتاجينه)
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false
      # إعدادات عامة
      - WEBUI_NAME=AI Company
      - DEFAULT_LOCALE=ar
      - ENABLE_SIGNUP=false
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Tool Calls API
      - TOOLS_FUNCTION_CALLING_PROMPT_INJECTION=true
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_USERNAME=${GIT_USERNAME:-}
      - TOOLS_API_URL=http://ai-tools-api:9000
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "8888:8080"
    networks:
      - ai-company-net
    mem_limit: 1g

  # خدمة الأدوات الخارجية — تربط Open WebUI بـ GitHub و OpenHands
  tools-api:
    build: ../tools-api
    container_name: ai-tools-api
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_USERNAME=${GIT_USERNAME:-}
      - CODE_WRITER_URL=http://ai-code-writer:9001
      - PORT=9000
    networks:
      - ai-company-net
    mem_limit: 128m

  # كاتب الكود — يولّد الكود بـ Claude ويرفعه على GitHub مباشرة
  code-writer:
    build: ../code-writer
    container_name: ai-code-writer
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PORT=9001
    networks:
      - ai-company-net
    mem_limit: 256m

  # OpenHands V1 — مبرمج الذكاء الاصطناعي
  openhands:
    image: ghcr.io/openhands/openhands:latest
    container_name: ai-openhands
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.25.0-python
      - WORKSPACE_MOUNT_PATH=/opt/workspace
      # GitHub credentials — تيجي أوتوماتيك من Infisical عبر .env
      - SANDBOX_ENV_GITHUB_TOKEN=${GITHUB_TOKEN}
      - SANDBOX_ENV_GIT_USERNAME=${GIT_USERNAME}
      - SANDBOX_ENV_GIT_EMAIL=${GIT_USERNAME}@users.noreply.github.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ai-company/data/openhands:/.openhands
      - /opt/ai-company/data/workspace:/opt/workspace
    ports:
      - "3000:3000"
    networks:
      - ai-company-net
    mem_limit: 4g
