# بوابة النماذج LiteLLM — متعدّدة المزوّدين
# المفاتيح تُقرأ من متغيّرات البيئة (مُحقَنة من Infisical).
model_list:
  # ===== Anthropic (Claude) =====
  - model_name: claude
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ===== OpenAI =====
  - model_name: gpt
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ===== OpenRouter (wildcard) =====
  # بدل alias ثابت واحد ("openrouter/auto" يتجاهل اختيار المستخدم الفعلي
  # ويُسلّم الاختيار لـ OpenRouter نفسه) — الـ wildcard يسمح بتمرير أي موديل
  # OpenRouter حقيقي بالاسم الكامل مباشرة (مثل openrouter/deepseek/deepseek-v3.2)
  - model_name: openrouter/*
    litellm_params:
      model: openrouter/*
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  request_timeout: 600
